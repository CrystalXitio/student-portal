<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCS - Subject Dashboard</title>
    <link rel="stylesheet" href="style-subject.css">
</head>
<body>
    <div class="container">
        <header class="subject-header">
            <h1>TCS</h1>
            <p>Theoretical Computer Science</p>
        </header>

        <div class="dashboard-grid">
            <div class="card">
                <h2>Attendance</h2>
                <div class="attendance-stats">
                    <div class="stat-box"><span class="stat-value">24</span><span class="stat-label">Attended</span></div>
                    <div class="stat-box"><span class="stat-value">6</span><span class="stat-label">Missed</span></div>
                    <div class="stat-box"><span class="stat-value">30</span><span class="stat-label">Total</span></div>
                    <div class="stat-box highlight"><span class="stat-value">80%</span><span class="stat-label">Percentage</span></div>
                </div>
            </div>

            <div class="card">
                <h2>ICA Marks</h2>
                <div class="ica-container">
                    <span class="ica-score">45</span><span class="ica-total">/ 50</span>
                </div>
            </div>

            <div class="card">
                <h2>Assignments</h2>
                <div class="controls">
                    <button class="filter-btn active">Upcoming</button>
                    <button class="filter-btn">Completed</button>
                    <button class="filter-btn">Past Due</button>
                </div>
                <div class="scrollable-box">
                    <div class="list-item">
                        <div>
                            <strong>Sample Assignment 1</strong>
                            <p>Complete the theory questions.</p>
                        </div>
                        <span class="badge upcoming">Due: Tomorrow</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Learning Resources</h2>
                <div class="controls">
                    <input type="text" class="search-input" placeholder="Search resources...">
                    <select class="sort-select">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="az">A - Z</option>
                    </select>
                </div>
                <div class="scrollable-box">
                    <div class="list-item"><strong>Syllabus.pdf</strong></div>
                    <div class="list-item"><strong>Chapter 1 Notes.pdf</strong></div>
                </div>
            </div>

            <div class="card teams-card">
                <h2>Teams Environment</h2>
                <div class="teams-placeholder">
                    <div class="chat-icon">💬</div>
                    <p>Teams Chat Environment Placeholder</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
