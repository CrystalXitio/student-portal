<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fee Status Management</title>
    <link rel="stylesheet" href="../css/style-dashboard.css">
    <style>
        .fee-select {
            padding: 4px;
            border-radius: 4px;
            font-weight: bold;
            border: 1px solid #ccc;
            outline: none;
            cursor: pointer;
        }
        .fee-select.paid { color: #27ae60; background-color: #eafaf1; border-color: #27ae60; }
        .fee-select.pending { color: #e74c3c; background-color: #fdf2f2; border-color: #e74c3c; }
        body.dark-mode .fee-select { background-color: #0f172a; }
        body.dark-mode .fee-select.paid { color: #27ae60; border-color: #27ae60; }
        body.dark-mode .fee-select.pending { color: #e74c3c; border-color: #e74c3c; }
    </style>
</head>
<body>
    <script>if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');</script>
    <div id="side-menu" class="side-menu">
        <a href="javascript:void(0)" class="close-btn" onclick="toggleMenu()">&times;</a>
        <a href="admin-dashboard.html">Dashboard Overview</a>
        <a href="admin-students.html">Manage Students</a>
        <a href="admin-teachers.html">Manage Teachers</a>
        <a href="admin-courses.html">Manage Courses</a>
        <a href="admin-subjects.html">Manage Subjects</a>
        <a href="admin-classes.html">Manage Classes</a>
        <a href="admin-fees.html" class="active">Fee Status</a>
        <a href="admin-announcements.html">Announcements</a>
        <a href="admin-tickets.html">Support Tickets</a>
    </div>

    <div id="main-content">
        <header class="top-header">
            <div class="header-left"><span class="hamburger-icon" onclick="toggleMenu()">&#9776;</span><img src="logo.png" alt="Logo" class="logo"></div>
            <h1 class="portal-title">Fee Status Management</h1>
            <div class="header-right">
                <div class="top-icons">
                    <div class="profile-icon" style="background-color: #d35400;" onclick="window.location.href='admin-profile.html'" title="View Profile">ADM</div>
                </div>
            </div>
        </header>

        <main class="dashboard-main">
            <div class="card">
                <h2>Student Fee Ledger</h2>
                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Roll No</th>
                                <th>Student Name</th>
                                <th>Year 1 Status</th>
                                <th>Year 2 Status</th>
                                <th>Year 3 Status</th>
                                <th>Year 4 Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>N005</td>
                                <td>Agrim Arya</td>
                                <td>
                                    <select class="fee-select paid" onchange="updateFeeColor(this)">
                                        <option value="paid" selected>Paid</option>
                                        <option value="pending">Pending</option>
                                    </select>
                                </td>
                                <td>
                                    <select class="fee-select paid" onchange="updateFeeColor(this)">
                                        <option value="paid" selected>Paid</option>
                                        <option value="pending">Pending</option>
                                    </select>
                                </td>
                                <td>
                                    <select class="fee-select pending" onchange="updateFeeColor(this)">
                                        <option value="paid">Paid</option>
                                        <option value="pending" selected>Pending</option>
                                    </select>
                                </td>
                                <td>
                                    <select class="fee-select pending" onchange="updateFeeColor(this)">
                                        <option value="paid">Paid</option>
                                        <option value="pending" selected>Pending</option>
                                    </select>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/app.js"></script>
    <script>
        function updateFeeColor(selectElement) {
            if(selectElement.value === 'paid') {
                selectElement.classList.add('paid');
                selectElement.classList.remove('pending');
            } else {
                selectElement.classList.add('pending');
                selectElement.classList.remove('paid');
            }
        }
    </script>
</body>
</html>
