<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Marks</title>
    <link rel="stylesheet" href="../css/style-dashboard.css">
</head>
<body>
    <script>if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');</script>

    <div id="side-menu" class="side-menu">
        <a href="javascript:void(0)" class="close-btn" onclick="toggleMenu()">&times;</a>
        <a href="teacher-dashboard.html">My Timetable</a>
        <a href="teacher-classes.html">My Classes</a>
        <a href="teacher-lor.html">LOR (Letter of Recommendation)</a>
        <a href="teacher-helpdesk.html">Help Desk</a>
    </div>

    <div id="main-content" style="margin-left: 0;">
        <header class="top-header">
            <div class="header-left">
                <button onclick="window.history.back()" style="padding: 8px 15px; border:none; background:#0056b3; color:white; border-radius:4px; cursor:pointer; font-weight: bold;">&larr; Back</button>
            </div>
            <h1 class="portal-title">Update Marks Entry</h1>
            <div class="header-right">
                <div class="top-icons">
                    <div class="dropdown-container">
                        <span class="icon" title="Settings" onclick="toggleDropdown('settings-dropdown')">&#9881;</span>
                        <div class="dropdown-menu" id="settings-dropdown">
                            <div class="dropdown-header">Settings</div>
                            <a href="javascript:void(0)" class="settings-item" onclick="openPasswordModal()">Change Password</a>
                            <a href="javascript:void(0)" class="settings-item" onclick="toggleTheme()">Appearance (Dark/Light)</a>
                            <a href="../index.html" class="settings-item logout-link">Logout</a>
                        </div>
                    </div>
                    <div class="profile-icon" onclick="window.location.href='teacher-profile.html'">MKA</div>
                </div>
            </div>
        </header>

        <main class="dashboard-main">
            <div class="card">
                <h2>Enter Marks</h2>
                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Roll No</th>
                                <th>Student Name</th>
                                <th>ICA 1 (Out of 25)</th>
                                <th>ICA 2 (Out of 25)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>N001</td>
                                <td>Aarav Patel</td>
                                <td><input type="number" max="25" min="0" value="22" style="width: 80px; padding: 5px;"></td>
                                <td><input type="number" max="25" min="0" style="width: 80px; padding: 5px;"></td>
                            </tr>
                            <tr>
                                <td>N005</td>
                                <td>Agrim Arya</td>
                                <td><input type="number" max="25" min="0" value="24" style="width: 80px; padding: 5px;"></td>
                                <td><input type="number" max="25" min="0" style="width: 80px; padding: 5px;"></td>
                            </tr>
                            <tr>
                                <td>N006</td>
                                <td>Rahul Sharma</td>
                                <td><input type="number" max="25" min="0" value="18" style="width: 80px; padding: 5px;"></td>
                                <td><input type="number" max="25" min="0" style="width: 80px; padding: 5px;"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div style="text-align: right; margin-top: 20px;">
                    <button class="submit-btn" style="width: auto; padding: 10px 30px; background-color: #27ae60;" onclick="alert('Marks Saved Successfully!'); window.history.back();">Save All Marks</button>
                </div>
            </div>
        </main>
    </div>

    <div id="password-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closePasswordModal()">&times;</span>
            <h3>Change Password</h3>
            <div class="input-group">
                <label>New Password</label>
                <input type="password" placeholder="Enter new password">
            </div>
            <div class="input-group">
                <label>Confirm New Password</label>
                <input type="password" placeholder="Confirm new password">
            </div>
            <button class="submit-btn" onclick="closePasswordModal()">Enter</button>
        </div>
    </div>

    <script src="../js/app.js"></script>
</body>
</html>
