<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Broadcast Announcements</title>
    <link rel="stylesheet" href="../css/style-dashboard.css">
</head>
<body>
    <script>if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');</script>
    <div id="side-menu" class="side-menu">
        <a href="javascript:void(0)" class="close-btn" onclick="toggleMenu()">&times;</a>
        <a href="admin-dashboard.html">Dashboard Overview</a>
        <a href="admin-students.html">Manage Students</a>
        <a href="admin-teachers.html">Manage Teachers</a>
        <a href="admin-courses.html">Manage Courses</a>
        <a href="admin-subjects.html">Manage Subjects</a>
        <a href="admin-classes.html">Manage Classes</a>
        <a href="admin-fees.html">Fee Status</a>
        <a href="admin-announcements.html" class="active">Announcements</a>
        <a href="admin-tickets.html">Support Tickets</a>
    </div>

    <div id="main-content">
        <header class="top-header">
            <div class="header-left"><span class="hamburger-icon" onclick="toggleMenu()">&#9776;</span><img src="logo.png" alt="Logo" class="logo"></div>
            <h1 class="portal-title">Broadcast System</h1>
            <div class="header-right">
                <div class="top-icons">
                    <div class="profile-icon" style="background-color: #d35400;" onclick="window.location.href='admin-profile.html'" title="View Profile">ADM</div>
                </div>
            </div>
        </header>

        <main class="dashboard-main">
            <div class="card" style="max-width: 700px;">
                <h2>Send New Broadcast</h2>
                <form onsubmit="event.preventDefault(); alert('Announcement sent successfully!');">
                    <div class="input-group">
                        <label>Target Audience</label>
                        <select required>
                            <option value="">Select Audience...</option>
                            <option value="students">Students Only</option>
                            <option value="teachers">Teachers Only</option>
                            <option value="all">Everyone</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Title</label>
                        <input type="text" required placeholder="e.g. Exam Schedule Released">
                    </div>
                    <div class="input-group">
                        <label>Message Content</label>
                        <textarea rows="6" required placeholder="Type the announcement here..."></textarea>
                    </div>
                    <button type="submit" class="submit-btn" style="background-color: #e67e22;">Send Broadcast</button>
                </form>
            </div>
        </main>
    </div>
    <script src="../js/app.js"></script>
</body>
</html>
