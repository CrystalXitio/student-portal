<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fee Details</title>
    <link rel="stylesheet" href="../css/style-dashboard.css">
</head>
<body>
    <script>if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');</script>
    
    <div id="side-menu" class="side-menu">
        <a href="javascript:void(0)" class="close-btn" onclick="toggleMenu()">&times;</a>
        <a href="dashboard.html">Home</a>
        <a href="attendance.html">Attendance Tracker</a>
        <a href="results.html">Exam Results</a>
        <a href="calendar.html">Academic Calendar</a>
        <a href="fees.html" class="active">Fee Details</a>
        <a href="helpdesk.html">Help Desk</a>
    </div>

    <div id="main-content">
        <header class="top-header">
            <div class="header-left"><span class="hamburger-icon" onclick="toggleMenu()">&#9776;</span><img src="logo.png" alt="Logo" class="logo"></div>
            <h1 class="portal-title">Fee Management</h1>
            <div class="header-right"><div class="profile-icon" onclick="window.location.href='profile.html'">AA</div></div>
        </header>

        <main class="dashboard-main">
            <div class="card" style="max-width: 800px;">
                <h2>Academic Year 2025-26 Summary</h2>
                
                <div style="display: flex; gap: 20px; margin-bottom: 30px;">
                    <div style="flex: 1; padding: 20px; background: #eafaf1; border-left: 4px solid #27ae60; border-radius: 8px;">
                        <span style="font-size: 12px; color: #555; text-transform: uppercase; font-weight: bold;">Amount Paid</span>
                        <div style="font-size: 28px; font-weight: bold; color: #27ae60; margin-top: 5px;">₹ 3,50,000</div>
                    </div>
                    <div style="flex: 1; padding: 20px; background: #f8f9fa; border-left: 4px solid #0056b3; border-radius: 8px;">
                        <span style="font-size: 12px; color: #555; text-transform: uppercase; font-weight: bold;">Outstanding Dues</span>
                        <div style="font-size: 28px; font-weight: bold; color: #0056b3; margin-top: 5px;">₹ 0</div>
                    </div>
                </div>

                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Transaction ID</th>
                                <th>Date</th>
                                <th>Description</th>
                                <th>Amount</th>
                                <th>Receipt</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>TXN-8472910</td>
                                <td>15 Jun 2025</td>
                                <td>Year 2 Tuition Fee</td>
                                <td>₹ 3,50,000</td>
                                <td><a href="#" style="color:#0056b3;">Download</a></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/app.js"></script>
</body>
</html>
