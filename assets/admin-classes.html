<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Classes</title>
    <link rel="stylesheet" href="../css/style-dashboard.css">
</head>
<body>
    <script>if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');</script>
    <div id="side-menu" class="side-menu">
        <a href="javascript:void(0)" class="close-btn" onclick="toggleMenu()">&times;</a>
        <a href="admin-dashboard.html">Dashboard Overview</a>
        <a href="admin-students.html">Manage Students</a>
        <a href="admin-teachers.html">Manage Teachers</a>
        <a href="admin-courses.html">Manage Courses</a>
        <a href="admin-subjects.html">Manage Subjects</a>
        <a href="admin-classes.html" class="active">Manage Classes</a>
        <a href="admin-fees.html">Fee Status</a>
        <a href="admin-announcements.html">Announcements</a>
        <a href="admin-tickets.html">Support Tickets</a>
    </div>

    <div id="main-content">
        <header class="top-header">
            <div class="header-left"><span class="hamburger-icon" onclick="toggleMenu()">&#9776;</span><img src="logo.png" alt="Logo" class="logo"></div>
            <h1 class="portal-title">Manage Classes / Batches</h1>
            <div class="header-right">
                <div class="top-icons">
                    <div class="profile-icon" style="background-color: #d35400;" onclick="window.location.href='admin-profile.html'" title="View Profile">ADM</div>
                </div>
            </div>
        </header>

        <main class="dashboard-main">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="border: none; margin: 0;">Active Classes</h2>
                    <button class="submit-btn" style="width: auto; margin: 0; background: #27ae60;" onclick="openCrudModal('Add New Class')">+ Add Class</button>
                </div>
                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Class Name</th>
                                <th>Subject</th>
                                <th>Type</th>
                                <th style="text-align: center;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>D Div</td>
                                <td>CVT (MBA Tech)</td>
                                <td>Theory</td>
                                <td style="text-align: center;">
                                    <button style="padding: 5px 10px; background: #f39c12; color: white; border: none; border-radius: 4px; cursor: pointer;" onclick="openCrudModal('Modify Class')">Edit</button>
                                    <button style="padding: 5px 10px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer;" onclick="confirm('Delete class?')">Delete</button>
                                </td>
                            </tr>
                            <tr>
                                <td>D1 Batch</td>
                                <td>CVT (MBA Tech)</td>
                                <td>Lab</td>
                                <td style="text-align: center;">
                                    <button style="padding: 5px 10px; background: #f39c12; color: white; border: none; border-radius: 4px; cursor: pointer;" onclick="openCrudModal('Modify Class')">Edit</button>
                                    <button style="padding: 5px 10px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer;" onclick="confirm('Delete class?')">Delete</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="crud-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="document.getElementById('crud-modal').style.display='none'">&times;</span>
            <h3 id="crud-title">Add/Edit Class</h3>
            <form onsubmit="event.preventDefault(); alert('Class saved successfully!'); document.getElementById('crud-modal').style.display='none';">
                <div class="input-group"><label>Class / Batch Name</label><input type="text" required placeholder="e.g. D1 Batch"></div>
                <div class="input-group">
                    <label>Select Unique Subject</label>
                    <select required>
                        <option value="">Select Subject...</option>
                        <option value="cvt_mba">Complex Variables & Transforms (MBA Tech)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Type</label>
                    <select required>
                        <option value="Theory">Theory</option>
                        <option value="Lab">Lab</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Enter / Save</button>
            </form>
        </div>
    </div>
    <script src="../js/app.js"></script>
    <script>
        function openCrudModal(title) {
            document.getElementById('crud-title').innerText = title;
            document.getElementById('crud-modal').style.display = 'flex';
        }
    </script>
</body>
</html>
