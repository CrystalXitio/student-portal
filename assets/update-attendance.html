<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Attendance</title>
    <link rel="stylesheet" href="../css/style-dashboard.css">
    <style>
        .radio-group { display: flex; gap: 15px; justify-content: center; }
        .radio-group label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        input[type="radio"] { cursor: pointer; }
    </style>
</head>
<body>
    <script>if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');</script>

    <div id="side-menu" class="side-menu">
        <a href="javascript:void(0)" class="close-btn" onclick="toggleMenu()">&times;</a>
        <a href="teacher-dashboard.html">My Timetable</a>
        <a href="teacher-classes.html">My Classes</a>
        <a href="teacher-lor.html">LOR (Letter of Recommendation)</a>
        <a href="teacher-helpdesk.html">Help Desk</a>
    </div>

    <div id="main-content" style="margin-left: 0;">
        <header class="top-header">
            <div class="header-left">
                <button onclick="window.history.back()" style="padding: 8px 15px; border:none; background:#0056b3; color:white; border-radius:4px; cursor:pointer; font-weight: bold;">&larr; Back</button>
            </div>
            <h1 class="portal-title">Mark Today's Attendance</h1>
            <div class="header-right">
                <div class="profile-icon" onclick="window.location.href='teacher-profile.html'">MKA</div>
            </div>
        </header>

        <main class="dashboard-main">
            <div class="card">
                <h2>Date: <input type="date" id="attendanceDate" value="" style="padding: 5px; font-size: 16px;"></h2>
                <script>document.getElementById('attendanceDate').valueAsDate = new Date();</script>
                
                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Roll No</th>
                                <th>Student Name</th>
                                <th>Attendance Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>N001</td>
                                <td>Aarav Patel</td>
                                <td>
                                    <div class="radio-group">
                                        <label><input type="radio" name="att_N001" value="present" checked> Present</label>
                                        <label><input type="radio" name="att_N001" value="absent"> Absent</label>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td>N005</td>
                                <td>Agrim Arya</td>
                                <td>
                                    <div class="radio-group">
                                        <label><input type="radio" name="att_N005" value="present" checked> Present</label>
                                        <label><input type="radio" name="att_N005" value="absent"> Absent</label>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td>N006</td>
                                <td>Rahul Sharma</td>
                                <td>
                                    <div class="radio-group">
                                        <label><input type="radio" name="att_N006" value="present" checked> Present</label>
                                        <label><input type="radio" name="att_N006" value="absent"> Absent</label>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div style="text-align: right; margin-top: 20px;">
                    <button class="submit-btn" id="saveAttBtn" style="width: auto; padding: 10px 30px; background-color: #27ae60;" onclick="saveAttendance()">Submit Attendance</button>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/app.js"></script>
    <script>
        async function saveAttendance() {
            const btn = document.getElementById('saveAttBtn');
            btn.innerText = 'Submitting...';
            btn.disabled = true;

            const dateValue = document.getElementById('attendanceDate').value;
            const rows = document.querySelectorAll('tbody tr');
            const records = [];

            // Extract the subject code from the URL dynamically
            const urlParams = new URLSearchParams(window.location.search);
            const subjectCode = urlParams.get('id');
            if (!subjectCode) {
                alert("Subject missing! Please open this page directly from a class.");
                return;
            }

            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                const studentId = cells[0].innerText.trim();
                const statusInput = row.querySelector(`input[name="att_${studentId}"]:checked`);
                
                if (statusInput) {
                    records.push({ 
                        studentId: studentId, 
                        status: statusInput.value 
                    });
                }
            });

            try {
                const res = await fetch('http://localhost:3000/api/teacher/attendance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        subjectCode: subjectCode, 
                        date: dateValue, 
                        records: records 
                    })
                });
                
                const data = await res.json();
                if (data.success) {
                    alert('Attendance successfully logged into MySQL!');
                    window.history.back();
                } else {
                    alert('Error saving: ' + data.message);
                }
            } catch (err) {
                console.error(err);
                alert('Connection error! Ensure your MySQL-backed Node server is running.');
            } finally {
                btn.innerText = 'Submit Attendance';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
