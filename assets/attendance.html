<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Tracker</title>
    <link rel="stylesheet" href="../css/style-dashboard.css">
</head>
<body>
    <script>if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');</script>
    
    <div id="side-menu" class="side-menu">
        <a href="javascript:void(0)" class="close-btn" onclick="toggleMenu()">&times;</a>
        <a href="dashboard.html">Home</a>
        <a href="attendance.html" class="active">Attendance Tracker</a>
        <a href="results.html">Exam Results</a>
        <a href="calendar.html">Academic Calendar</a>
        <a href="fees.html">Fee Details</a>
        <a href="helpdesk.html">Help Desk</a>
    </div>

    <div id="main-content">
        <header class="top-header">
            <div class="header-left"><span class="hamburger-icon" onclick="toggleMenu()">&#9776;</span><img src="logo.png" alt="Logo" class="logo"></div>
            <h1 class="portal-title">Attendance Tracker</h1>
            <div class="header-right"><div class="top-icons">
                <div class="profile-icon" onclick="window.location.href='profile.html'">AA</div>
            </div></div>
        </header>

        <main class="dashboard-main">
            <div class="card">
                <h2>Consolidated Attendance</h2>
                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Code</th>
                                <th>Subject</th>
                                <th>Type</th>
                                <th>Total</th>
                                <th>Attended</th>
                                <th>Missed</th>
                                <th>%</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="attendance-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/app.js"></script>
    <script>
        const attendanceData = [
            { code: 'COA', name: 'Computer Architecture', type: 'Theory', total: 30, attended: 24 },
            { code: 'DBMS', name: 'Database Management', type: 'Theory', total: 28, attended: 25 },
            { code: 'DBMS-D', name: 'Database Management Lab', type: 'Lab', total: 12, attended: 12 },
            { code: 'CVT', name: 'Complex Variables', type: 'Theory', total: 30, attended: 24 },
            { code: 'CVT-D', name: 'Complex Variables Lab', type: 'Lab', total: 12, attended: 10 },
            { code: 'WP', name: 'Web Programming', type: 'Theory', total: 25, attended: 20 },
            { code: 'DAA', name: 'Design of Algorithms', type: 'Theory', total: 32, attended: 30 },
            { code: 'MAE', name: 'Management & Econ', type: 'Theory', total: 20, attended: 15 }
        ];

        const tbody = document.getElementById('attendance-body');
        attendanceData.forEach(sub => {
            const missed = sub.total - sub.attended;
            const percent = Math.round((sub.attended / sub.total) * 100);
            const statusClass = percent >= 80 ? 'status-good' : (percent >= 75 ? 'status-warn' : 'status-danger');
            const statusText = percent >= 80 ? 'Good' : (percent >= 75 ? 'Warning' : 'Critical');
            
            tbody.innerHTML += `
                <tr>
                    <td><strong>${sub.code}</strong></td>
                    <td>${sub.name}</td>
                    <td>${sub.type}</td>
                    <td>${sub.total}</td>
                    <td>${sub.attended}</td>
                    <td>${missed}</td>
                    <td><strong>${percent}%</strong></td>
                    <td class="${statusClass}">${statusText}</td>
                </tr>
            `;
        });
    </script>
</body>
</html>
