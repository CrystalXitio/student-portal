<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Tracker</title>
    <link rel="stylesheet" href="../css/style-dashboard.css">
</head>
<body>
    <script>if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');</script>
    
    <div id="side-menu" class="side-menu">
        <a href="javascript:void(0)" class="close-btn" onclick="toggleMenu()">&times;</a>
        <a href="dashboard.html">Home</a>
        <a href="attendance.html" class="active">Attendance Tracker</a>
        <a href="results.html">Exam Results</a>
        <a href="calendar.html">Academic Calendar</a>
        <a href="fees.html">Fee Details</a>
        <a href="helpdesk.html">Help Desk</a>
    </div>

    <div id="main-content">
        <header class="top-header">
            <div class="header-left"><span class="hamburger-icon" onclick="toggleMenu()">&#9776;</span><img src="logo.png" alt="Logo" class="logo"></div>
            <h1 class="portal-title">Attendance Tracker</h1>
            <div class="header-right"><div class="top-icons">
                <div class="profile-icon" onclick="window.location.href='profile.html'">AA</div>
            </div></div>
        </header>

        <main class="dashboard-main">
            <div class="card">
                <h2>Consolidated Attendance</h2>
                <div class="data-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Code</th>
                                <th>Subject</th>
                                <th>Type</th>
                                <th>Total</th>
                                <th>Attended</th>
                                <th>Missed</th>
                                <th>%</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="attendance-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/app.js"></script>
    <script>
        async function fetchAttendance() {
            const studentId = localStorage.getItem('userId') || 'N005';
            const tbody = document.getElementById('attendance-body');
            
            try {
                tbody.innerHTML = '<tr><td colspan="8">Fetching attendance from MySQL...</td></tr>';
                const res = await fetch(`http://localhost:3000/api/student/attendance?studentId=${studentId}`);
                const data = await res.json();
                
                tbody.innerHTML = '';
                
                if (data.success && data.data && data.data.length > 0) {
                    data.data.forEach(sub => {
                        const missed = sub.total - sub.attended;
                        const percent = sub.total > 0 ? Math.round((sub.attended / sub.total) * 100) : 0;
                        const statusClass = percent >= 80 ? 'status-good' : (percent >= 75 ? 'status-warn' : 'status-danger');
                        const statusText = percent >= 80 ? 'Good' : (percent >= 75 ? 'Warning' : 'Critical');
                        
                        tbody.innerHTML += `
                            <tr>
                                <td><strong>${sub.code}</strong></td>
                                <td>${sub.name}</td>
                                <td>${sub.type}</td>
                                <td>${sub.total}</td>
                                <td>${sub.attended}</td>
                                <td>${missed}</td>
                                <td><strong>${percent}%</strong></td>
                                <td class="${statusClass}">${statusText}</td>
                            </tr>
                        `;
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="8">No attendance records found yet.</td></tr>';
                }
            } catch(e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="8" style="color:red">Failed to connect to backend server.</td></tr>';
            }
        }
        window.onload = fetchAttendance;
    </script>
</body>
</html>
