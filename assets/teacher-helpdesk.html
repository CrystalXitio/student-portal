<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Faculty Help Desk</title>
    <link rel="stylesheet" href="../css/style-dashboard.css">
</head>
<body>
    <script>if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');</script>

    <div id="side-menu" class="side-menu">
        <a href="javascript:void(0)" class="close-btn" onclick="toggleMenu()">&times;</a>
        <a href="teacher-dashboard.html">My Timetable</a>
        <a href="teacher-classes.html">My Classes</a>
        <a href="teacher-lor.html">LOR (Letter of Recommendation)</a>
        <a href="teacher-helpdesk.html" class="active">Help Desk</a>
    </div>

    <div id="main-content">
        <header class="top-header">
            <div class="header-left"><span class="hamburger-icon" onclick="toggleMenu()">&#9776;</span><img src="logo.png" alt="Logo" class="logo"></div>
            <h1 class="portal-title">Faculty Support</h1>
            <div class="header-right">
                <div class="top-icons">
                    <div class="dropdown-container">
                        <span class="icon" title="Settings" onclick="toggleDropdown('settings-dropdown')">&#9881;</span>
                        <div class="dropdown-menu" id="settings-dropdown">
                            <div class="dropdown-header">Settings</div>
                            <a href="javascript:void(0)" class="settings-item" onclick="openPasswordModal()">Change Password</a>
                            <a href="javascript:void(0)" class="settings-item" onclick="toggleTheme()">Appearance (Dark/Light)</a>
                            <a href="index.html" class="settings-item logout-link">Logout</a>
                        </div>
                    </div>
                    <div class="profile-icon" onclick="window.location.href='teacher-profile.html'">MKA</div>
                </div>
            </div>
        </header>

        <main class="dashboard-main">
            <div class="card" style="max-width: 600px;">
                <h2>Raise an IT or Admin Ticket</h2>
                <form onsubmit="event.preventDefault(); alert('Ticket Submitted Successfully!');">
                    <div class="input-group">
                        <label>Category</label>
                        <select required>
                            <option value="">Select Category...</option>
                            <option value="portal">Portal / Grading Issues</option>
                            <option value="hr">HR & Payroll</option>
                            <option value="infrastructure">Classroom Infrastructure</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Subject</label>
                        <input type="text" placeholder="Brief description of the issue" required>
                    </div>
                    <div class="input-group">
                        <label>Detailed Message</label>
                        <textarea rows="5" placeholder="Provide full details here..." required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Submit Ticket</button>
                </form>
            </div>
        </main>
    </div>

    <div id="password-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closePasswordModal()">&times;</span>
            <h3>Change Password</h3>
            <div class="input-group">
                <label>New Password</label>
                <input type="password" placeholder="Enter new password">
            </div>
            <div class="input-group">
                <label>Confirm New Password</label>
                <input type="password" placeholder="Confirm new password">
            </div>
            <button class="submit-btn" onclick="closePasswordModal()">Enter</button>
        </div>
    </div>

    <script src="../js/app.js"></script>
</body>
</html>
