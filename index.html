<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="css/style-index.css">
</head>
<body>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>

    <div class="login-container">
        <div class="logo-placeholder">
            <img id="logo-img" src="assets/logo.png" alt="College Logo">
        </div>
        
        <h2>Enter Login Details</h2>
        <p style="font-size: 12px; color: #666; margin-bottom: 20px;">
            <em>Hint: Type 'admin' for Admin Portal, 'prof' for Teacher Portal, or anything else for Student Portal.</em>
        </p>
        
        <form id="login-form">
            <div class="input-group">
                <label for="username">Email / SAP ID</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="login-btn">Login</button>
        </form>
    </div>

    <script>
        // Simple routing logic based on username
        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent default form submission
            
            const username = document.getElementById('username').value.toLowerCase();
            
            if (username.includes('admin')) {
                window.location.href = 'assets/admin-dashboard.html';
            } else if (username.includes('prof') || username.includes('teacher')) {
                window.location.href = 'assets/teacher-dashboard.html';
            } else {
                window.location.href = 'assets/dashboard.html';
            }
        });
    </script>
</body>
</html>
