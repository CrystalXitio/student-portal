<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="css/style-index.css">
</head>
<body>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>

    <div class="login-container">
        <div class="logo-placeholder">
            <img id="logo-img" src="assets/logo.png" alt="College Logo">
        </div>
       
        <h2>Enter Login Details</h2>
        <p style="font-size: 12px; color: #666; margin-bottom: 20px;">
            <em>Hint: Type 'admin' for Admin Portal, 'prof' for Teacher Portal, or anything else for Student Portal.</em>
        </p>
       
        <form id="login-form">
            <div id="error-message" style="color: red; margin-bottom: 15px; font-size: 14px; display: none;"></div>

            <div class="input-group">
                <label for="username">Email / SAP ID</label>
                <input type="text" id="username" name="username" required>
            </div>
           
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
           
            <button type="submit" class="login-btn">Login</button>
        </form>
    </div>

    <script>
        // Authenticate with the Node.js API
        document.getElementById('login-form').addEventListener('submit', async function(event) {
            event.preventDefault(); // Prevent default form submission
           
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            
            // Reset previous errors
            errorDiv.style.display = 'none';
           
            try {
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: username, password: password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Save user information for the dashboard to use
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('userRole', data.role);
                    localStorage.setItem('userName', data.name);
                    
                    // Route to correct dashboard based on role
                    if (data.role === 'admin') {
                        window.location.href = 'assets/admin-dashboard.html';
                    } else if (data.role === 'teacher') {
                        window.location.href = 'assets/teacher-dashboard.html';
                    } else {
                        window.location.href = 'assets/dashboard.html';
                    }
                } else {
                    // Show error message from backend
                    errorDiv.innerText = data.message || "Invalid credentials.";
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                console.error('Login error:', err);
                errorDiv.innerText = "Error connecting to server. Is it running?";
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
