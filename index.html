<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="css/style-index.css">
</head>
<body>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>

    <div class="login-container">
        <div class="logo-placeholder">
            <img id="logo-img" src="assets/logo.png" alt="College Logo">
        </div>
        
        <h2>Enter Login Details</h2>
        <p style="font-size: 13px; color: #666; margin-bottom: 20px; padding: 10px; background: #f8f9fa; border-radius: 5px; border-left: 3px solid #0056b3;">
            <strong>Test Credentials:</strong><br>
            Admin: <em>ADM-001</em> / <em>admin123</em><br>
            Teacher: <em>FAC-1029</em> / <em>prof123</em><br>
            Student: <em>N005</em> / <em>student123</em>
        </p>
        
        <form id="login-form">
            <div class="input-group">
                <label for="username">User ID / SAP ID</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="login-btn">Login</button>
        </form>
    </div>

    <script>
        // Real routing logic connected to Node.js backend
        document.getElementById('login-form').addEventListener('submit', async function(event) {
            event.preventDefault(); // Prevent default form submission
            
            const idValue = document.getElementById('username').value;
            const passValue = document.getElementById('password').value;
            
            try {
                // Send the login details to our Node.js server
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: idValue, password: passValue })
                });

                // Read the server's reply
                const data = await response.json();

                if (data.success) {
                    // LOGIN SUCCESSFUL!
                    // Save the session details in Local Storage so all other pages know who is logged in
                    localStorage.setItem('activeUserId', data.userId);
                    localStorage.setItem('activeUserRole', data.role);
                    localStorage.setItem('activeUserName', data.name);

                    // Redirect to the correct portal based on their role from the database
                    if (data.role === 'admin') {
                        window.location.href = 'assets/admin-dashboard.html';
                    } else if (data.role === 'teacher') {
                        window.location.href = 'assets/teacher-dashboard.html';
                    } else if (data.role === 'student') {
                        window.location.href = 'assets/dashboard.html'; 
                    }
                } else {
                    // LOGIN FAILED
                    alert(data.message); // Shows "Invalid ID or Password!"
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Cannot connect to the server. Make sure your Node.js server is running!');
            }
        });
    </script>
</body>
</html>
